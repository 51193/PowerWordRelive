<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>PowerWordRelive</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <header class="header">
        <h1>PowerWordRelive</h1>
        <div class="status-bar">
            <span class="status-dot disconnected" id="status-indicator"></span>
            <span id="status-text">未连接</span>
        </div>
    </header>

    <main class="main">
        <aside class="chat-panel">
            <div class="chat-header">
                <select id="character-select">
                    <option value="">全部角色</option>
                </select>
                <span class="msg-count" id="msg-count"></span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-placeholder">连接后端以加载消息</div>
            </div>
            <button class="scroll-bottom-btn" id="scroll-bottom">↓ 底部</button>
        </aside>

        <section class="data-panel">
            <div class="tabs" id="panel-tabs">
                <button class="tab active" data-tab="story_progress">故事进展</button>
                <button class="tab" data-tab="task">任务</button>
                <button class="tab" data-tab="keyword_notes">关键字笔记</button>
                <button class="tab" data-tab="consistency">一致性表格</button>
            </div>
            <div class="sp-list" id="sp-list">
                <div class="chat-placeholder">连接后端以加载内容</div>
            </div>
            <div class="task-container" id="task-container" style="display:none">
                <div class="sub-tabs" id="task-sub-tabs">
                    <button class="sub-tab active" data-status="in_progress">进行中</button>
                    <button class="sub-tab" data-status="complete">已完成</button>
                    <button class="sub-tab" data-status="fail">已失败</button>
                    <button class="sub-tab" data-status="discard">已放弃</button>
                </div>
                <div class="task-list" id="task-list">
                    <div class="chat-placeholder">连接后端以加载内容</div>
                </div>
            </div>
            <div class="kw-container" id="kw-container" style="display:none">
                <div class="sub-tabs" id="kw-sub-tabs">
                    <button class="sub-tab active" data-tag="world">世界观</button>
                    <button class="sub-tab" data-tag="character">人物</button>
                    <button class="sub-tab" data-tag="item">物品</button>
                    <button class="sub-tab" data-tag="event">事件</button>
                </div>
                <div class="kw-list" id="kw-list">
                    <div class="chat-placeholder">连接后端以加载内容</div>
                </div>
            </div>
            <div class="consistency-list" id="con-list" style="display:none">
                <div class="chat-placeholder">连接后端以加载内容</div>
            </div>
        </section>
    </main>
</div>
<script src="js/app.js" type="module"></script>
</body>
</html>
