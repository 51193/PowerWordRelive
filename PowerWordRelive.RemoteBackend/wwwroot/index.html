<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>PowerWordRelive</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <header class="header">
        <h1>PowerWordRelive</h1>
        <div class="status-bar">
            <span class="status-dot disconnected" id="status-indicator"></span>
            <span id="status-text">未连接</span>
        </div>
    </header>

    <main class="main">
        <aside class="chat-panel">
            <div class="chat-header">
                <select id="character-select">
                    <option value="">全部角色</option>
                </select>
                <span class="msg-count" id="msg-count"></span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-placeholder">连接后端以加载消息</div>
            </div>
            <button class="scroll-bottom-btn" id="scroll-bottom" onclick="scrollToBottom()">↓ 底部</button>
        </aside>

        <section class="data-panel">
            <div class="tabs" id="panel-tabs">
                <button class="tab active" onclick="switchPanelTab('story_progress')">故事进展</button>
                <button class="tab" onclick="switchPanelTab('task')">任务</button>
                <button class="tab" onclick="switchPanelTab('consistency')">一致性表格（测试）</button>
            </div>
            <div class="sp-list" id="sp-list">
                <div class="chat-placeholder">连接后端以加载内容</div>
            </div>
            <div class="task-container" id="task-container" style="display:none">
                <div class="sub-tabs" id="task-sub-tabs">
                    <button class="sub-tab active" onclick="switchTaskTab('in_progress')">进行中</button>
                    <button class="sub-tab" onclick="switchTaskTab('complete')">已完成</button>
                    <button class="sub-tab" onclick="switchTaskTab('fail')">已失败</button>
                    <button class="sub-tab" onclick="switchTaskTab('discard')">已放弃</button>
                </div>
                <div class="task-list" id="task-list">
                    <div class="chat-placeholder">连接后端以加载内容</div>
                </div>
                <div class="pagination" id="task-pagination" style="display:none">
                    <button disabled id="task-prev" onclick="changeTaskPage(-1)">上一页</button>
                    <span id="task-page-info"></span>
                    <button disabled id="task-next" onclick="changeTaskPage(1)">下一页</button>
                </div>
            </div>
            <div class="pagination" id="sp-pagination" style="display:none">
                <button disabled id="sp-prev" onclick="changeSpPage(-1)">上一页</button>
                <span id="sp-page-info"></span>
                <button disabled id="sp-next" onclick="changeSpPage(1)">下一页</button>
            </div>
            <div class="consistency-list" id="con-list" style="display:none">
                <div class="chat-placeholder">连接后端以加载内容</div>
            </div>
            <div class="pagination" id="con-pagination" style="display:none">
                <button disabled id="con-prev" onclick="changeConPage(-1)">上一页</button>
                <span id="con-page-info"></span>
                <button disabled id="con-next" onclick="changeConPage(1)">下一页</button>
            </div>
        </section>
    </main>
</div>
<script src="app.js"></script>
</body>
</html>
