name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run CI (build + test + package)
        run: bash scripts/ci.sh

      - name: Upload RemoteBackend package
        uses: actions/upload-artifact@v4
        with:
          name: pwr-remote-linux-x64
          path: out/pkg/pwr-remote-*.tar.gz

      - name: Upload Main System package
        uses: actions/upload-artifact@v4
        with:
          name: pwr-main-linux-x64
          path: out/pkg/pwr-main-*.tar.gz

      - name: Attach packages to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/pkg/pwr-remote-*.tar.gz
            out/pkg/pwr-main-*.tar.gz
